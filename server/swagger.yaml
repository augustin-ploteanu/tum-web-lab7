openapi: 3.0.3
info:
  title: MyMovieList API
  description: |
    CRUD API for managing a personal movie and TV show watchlist.
    All `/entries` endpoints require a valid JWT obtained from `POST /token`.
  version: 1.0.0

servers:
  - url: http://localhost:3001

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    WatchableItem:
      type: object
      required: [id, media_type, poster_path]
      properties:
        id:
          type: integer
        media_type:
          type: string
          enum: [movie, tv]
        title:
          type: string
          description: Present for movies
        name:
          type: string
          description: Present for TV shows
        poster_path:
          type: string
          nullable: true
        release_date:
          type: string
          description: "YYYY-MM-DD, movies only"
        first_air_date:
          type: string
          description: "YYYY-MM-DD, TV shows only"

    ListEntry:
      type: object
      required: [id, item, category, grade, note, episodesWatched, totalEpisodes, addedAt]
      properties:
        id:
          type: string
          description: "`${media_type}-${tmdb_id}`"
          example: movie-550
        item:
          $ref: '#/components/schemas/WatchableItem'
        category:
          type: string
          enum: [completed, watching, plan_to_watch, dropped]
        grade:
          type: integer
          nullable: true
          minimum: 1
          maximum: 10
        note:
          type: string
        episodesWatched:
          type: integer
          nullable: true
        totalEpisodes:
          type: integer
          nullable: true
        addedAt:
          type: integer
          description: Unix timestamp (ms)

    EntriesPage:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ListEntry'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    Error:
      type: object
      properties:
        error:
          type: string

paths:
  /token:
    post:
      summary: Obtain a JWT
      description: Returns a signed JWT valid for 1 minute. No credentials required (demo).
      tags: [Auth]
      responses:
        '200':
          description: JWT issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string

  /entries:
    get:
      summary: List all entries (paginated)
      tags: [Entries]
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        '200':
          description: Paginated list of entries
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EntriesPage'
        '401':
          description: Missing or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    post:
      summary: Create a new entry
      tags: [Entries]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListEntry'
      responses:
        '201':
          description: Entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEntry'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Entry already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /entries/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        example: movie-550

    get:
      summary: Get a single entry
      tags: [Entries]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: The entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEntry'
        '401':
          description: Missing or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    put:
      summary: Replace an entry
      tags: [Entries]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ListEntry'
      responses:
        '200':
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEntry'
        '400':
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

    delete:
      summary: Delete an entry
      tags: [Entries]
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted successfully
        '401':
          description: Missing or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Insufficient permissions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
